<!doctype html>
<html lang="he" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- PWA / theme -->
    <meta name="theme-color" content="#C49438" />
    <meta name="application-name" content="Mimo" />
    <meta name="description" content="מימו — מעקב, סדנאות וקהילה לאמהות טריות" />

    <!-- Apple PWA -->
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Mimo" />
    <link rel="apple-touch-icon" href="/icons/icon-192.png" />

    <!-- Icon + title -->
    <link rel="icon" type="image/png" href="/mimo_logo.png" />
    <title>Mimo 🐣</title>

    <!-- Open Graph (for WhatsApp / social link previews) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="הרשמה לסדנאות מימו" />
    <meta property="og:description" content="הצטרפי לסדנאות מימו — מלווה אותך בצעדים הראשונים של האימהות" />
    <meta property="og:image" content="/mimo_logo.png" />
    <meta property="og:locale" content="he_IL" />
    <meta name="twitter:card" content="summary_large_image" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap" rel="stylesheet" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
